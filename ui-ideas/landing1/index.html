  <script type="text/babel">
    const { useRef, useEffect } = React;

    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const fadeTo = (target, duration) => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          const start = parseFloat(video.style.opacity || "0");
          const delta = target - start;
          const startTime = performance.now();

          const step = (now) => {
            const elapsed = now - startTime;
            const t = duration <= 0 ? 1 : Math.min(elapsed / duration, 1);
            video.style.opacity = String(start + delta * t);
            if (t < 1) {
              rafRef.current = requestAnimationFrame(step);
            } else {
              rafRef.current = null;
            }
          };

          rafRef.current = requestAnimationFrame(step);
        };

        const onLoadedData = () => {
          video.style.opacity = "0";
          const p = video.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
          fadeTo(1, FADE_MS);
        };

        const onTimeUpdate = () => {
          const remaining = video.duration - video.currentTime;
          if (
            !fadingOutRef.current &&
            remaining <= FADE_OUT_LEAD &&
            remaining > 0
          ) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const onEnded = () => {
          video.style.opacity = "0";
          setTimeout(() => {
            video.currentTime = 0;
            const p = video.play();
            if (p && typeof p.catch === "function") p.catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener("loadeddata", onLoadedData);
        video.addEventListener("timeupdate", onTimeUpdate);
        video.addEventListener("ended", onEnded);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener("loadeddata", onLoadedData);
          video.removeEventListener("timeupdate", onTimeUpdate);
          video.removeEventListener("ended", onEnded);
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          className={className}
          style={{ opacity: 0, ...style }}
          autoPlay
          muted
          playsInline
          preload="auto"
        />
      );
    }

    window.FadingVideo = FadingVideo;
  </script>

  <script type="text/babel">
    const { useRef: useRefBT, useEffect: useEffectBT, useState: useStateBT } = React;

    function BlurText({ text, className }) {
      const motion = window.Motion.motion;
      const containerRef = useRefBT(null);
      const [inView, setInView] = useStateBT(false);

      useEffectBT(() => {
        const el = containerRef.current;
        if (!el) return;
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                setInView(true);
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.1 }
        );
        observer.observe(el);
        return () => observer.disconnect();
      }, []);

      const words = text.split(" ");

      return (
        <p
          ref={containerRef}
          className={className}
          style={{
            display: "flex",
            flexWrap: "wrap",
            justifyContent: "center",
            rowGap: "0.1em",
          }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
              animate={
                inView
                  ? {
                      filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                      opacity: [0, 0.5, 1],
                      y: [50, -5, 0],
                    }
                  : {}
              }
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: "easeOut",
                delay: (i * 100) / 1000,
              }}
              style={{ display: "inline-block", marginRight: "0.28em" }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }

    window.BlurText = BlurText;
  </script>
